server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback for react-router-dom client-side routes
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Long cache for hashed Vite assets
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}

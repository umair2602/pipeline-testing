name: deploy
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::479802529222:role/StackFlyDeploy-qa-umair2602-pipeline-testing
          aws-region: us-east-1
      - name: Login to ECR
        run: aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 479802529222.dkr.ecr.us-east-1.amazonaws.com/stackfly-qa-api
      - name: Build & push image
        run: |
          docker build -t 479802529222.dkr.ecr.us-east-1.amazonaws.com/stackfly-qa-api:${{ github.sha }} .
          docker push 479802529222.dkr.ecr.us-east-1.amazonaws.com/stackfly-qa-api:${{ github.sha }}
      - name: Record deployment start
        if: success()
        run: |
          curl -sS -X POST "https://stackfly.onrender.com/api/f32e18f8-bb4e-45aa-844b-ddabf1312e41/services/858ee680-3151-40ea-bab8-90938a7ba97a/deployments" \
            -H "Authorization: Bearer ${{ secrets.STACKFLY_DEPLOY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "phase": "start",
              "status": "running",
              "imageTag": "'${{ github.sha }}'",
              "imageUri": "479802529222.dkr.ecr.us-east-1.amazonaws.com/stackfly-qa-api:'${{ github.sha }}'",
              "gitSha": "'${{ github.sha }}'",
              "gitRef": "'${{ github.ref }}'",
              "gitRunUrl": "'${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'",
              "actor": "'${{ github.actor }}'"
            }'
      - name: Pull & restart on EC2 instances via SSM
        run: |
          aws ssm send-command \
            --document-name AWS-RunShellScript \
            --targets "Key=tag:StackFlyEnvironmentId,Values=f32e18f8-bb4e-45aa-844b-ddabf1312e41" \
            --parameters 'commands=[
              "aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 479802529222.dkr.ecr.us-east-1.amazonaws.com/stackfly-qa-api",
              "docker pull 479802529222.dkr.ecr.us-east-1.amazonaws.com/stackfly-qa-api:'${{ github.sha }}'",
              "docker stop api || true",
              "docker rm api || true",
              "docker run -d --restart always --name api 479802529222.dkr.ecr.us-east-1.amazonaws.com/stackfly-qa-api:'${{ github.sha }}'"
            ]' \
            --comment "stackfly deploy api ${{ github.sha }}"
      - name: Record deployment finish
        if: always()
        run: |
          curl -sS -X POST "https://stackfly.onrender.com/api/f32e18f8-bb4e-45aa-844b-ddabf1312e41/services/858ee680-3151-40ea-bab8-90938a7ba97a/deployments" \
            -H "Authorization: Bearer ${{ secrets.STACKFLY_DEPLOY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "phase": "finish",
              "status": "succeeded",
              "imageTag": "'${{ github.sha }}'",
              "imageUri": "479802529222.dkr.ecr.us-east-1.amazonaws.com/stackfly-qa-api:'${{ github.sha }}'",
              "gitSha": "'${{ github.sha }}'",
              "gitRef": "'${{ github.ref }}'",
              "gitRunUrl": "'${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'",
              "actor": "'${{ github.actor }}'"
            }'
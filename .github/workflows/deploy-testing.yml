name: deploy
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::824867645786:role/StackFlyDeploy-test-env-2-umair2602-pipeline-testing
          aws-region: us-east-2
      - name: Login to ECR
        run: aws ecr get-login-password --region us-east-2 | docker login --username AWS --password-stdin 824867645786.dkr.ecr.us-east-2.amazonaws.com
      - name: Build & push image
        run: |
          docker build -t 824867645786.dkr.ecr.us-east-2.amazonaws.com/stackfly-test-env-2-testing:${{ github.sha }} .
          docker push 824867645786.dkr.ecr.us-east-2.amazonaws.com/stackfly-test-env-2-testing:${{ github.sha }}
      - name: Trigger StackFly deploy
        run: |
          HTTP_CODE=$(curl -sS -o /tmp/deploy-response.json -w "%{http_code}" -X POST "https://stackfly.onrender.com/api/e6e66ee1-c99b-4b17-abdb-5d485062302e/services/58087082-d8e7-4482-bdad-26cf0aacad79/deploy" \
            -H "Authorization: Bearer ${{ secrets.STACKFLY_DEPLOY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d @- <<EOF
          {
            "imageTag": "${{ github.sha }}",
            "imageUri": "824867645786.dkr.ecr.us-east-2.amazonaws.com/stackfly-test-env-2-testing:${{ github.sha }}",
            "gitSha": "${{ github.sha }}",
            "gitRef": "${{ github.ref }}",
            "gitRunUrl": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "actor": "${{ github.actor }}"
          }
          EOF
          )
          cat /tmp/deploy-response.json
          echo ""
          if [ "$HTTP_CODE" != "200" ]; then
            echo "StackFly deploy failed (HTTP $HTTP_CODE)"
            exit 1
          fi
          echo "Deploy succeeded"


